[pytest]
; asyncio_mode = auto cho phép viết `async def test_...` mà không cần
; đánh dấu @pytest.mark.asyncio trên từng test (yêu cầu pytest-asyncio).
asyncio_mode = auto

; Cho phép chạy `pytest` trực tiếp từ thư mục backend/ mà không cần
; cài package hoặc set PYTHONPATH thủ công.
pythonpath = .

testpaths = tests

; In log ngay cả khi test pass (vd: dòng print "[EVAL] ..." trong
; test_hallucination_guard.py) để dùng làm số liệu dán vào báo cáo.
addopts = -ra
