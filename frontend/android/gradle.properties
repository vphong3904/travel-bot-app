org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Dự án ở ổ F: nhưng pub-cache (nơi chứa source Kotlin của các plugin, vd
# google_sign_in_android) nằm ở ổ C: — Kotlin incremental compiler bị crash
# khi tính relative path giữa 2 ổ đĩa khác nhau trên Windows ("this and base
# files have different roots"). Tắt incremental compilation để tránh lỗi này.
kotlin.incremental=false
