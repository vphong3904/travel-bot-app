services:

  postgres:
    image: pgvector/pgvector:pg17
    container_name: travel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pdtrip_ai_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 12345678
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d pdtrip_ai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: travel_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  mongo:
    image: mongo:7
    container_name: travel_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: pdtrip_ai_logs
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
  mongo_data:
